version: "3.8"

services:
  secondbrain:
    build: .
    container_name: secondbrain
    ports:
      - "8501:8501"
    volumes:
      - ./data:/app/data          # persist ChromaDB + SQLite across restarts
      - ./config.yaml:/app/config.yaml  # mount config for live editing
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - SECOND_BRAIN_EMBEDDED_WORKER=0
    env_file:
      - .env
    restart: unless-stopped

  secondbrain-worker:
    build: .
    container_name: secondbrain-worker
    command: ["python", "worker.py"]
    volumes:
      - ./data:/app/data
      - ./config.yaml:/app/config.yaml
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import db; db._get_conn().execute('SELECT 1'); print('ok')"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s
